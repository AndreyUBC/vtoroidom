  <meta name="description" content="Фотографии хостела «Второй Дом» в Казани.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 24px;
    }
    .photo-grid a {
      display: block;
      overflow: hidden;
      border-radius: 8px;
      aspect-ratio: 4/3;
    }
    .photo-grid a img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .3s, opacity .2s;
      display: block;
    }
    .photo-grid a:hover img { transform: scale(1.04); opacity: .9; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,.6); }
    #lightbox-close {
      position: fixed;
      top: 20px; right: 24px;
      color: white; font-size: 2rem; cursor: pointer;
      background: none; border: none; line-height: 1;
    }

    @media (max-width: 600px) {
      .photo-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<script src="shared.js"></script>
<script>
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbClose = document.getElementById('lightbox-close');

  document.querySelectorAll('.photo-grid a').forEach(a => {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      lbImg.src = this.dataset.src;
      lb.classList.add('open');
    });
  });

  lbClose.addEventListener('click', () => lb.classList.remove('open'));
  lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
</script>
